name: Build and deploy mdBook

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    name: Build mdBook and publish to GitHub Pages
    runs-on: ubuntu-latest

    env:
      MDBOOK_VERSION: '0.5.12'
      MDBOOK_MERMAID_VERSION: '0.12.0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-installed binaries
        id: cargo-cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-mdbook-${{ env.MDBOOK_VERSION }}-${{ env.MDBOOK_MERMAID_VERSION }}-cargo-cache
          restore-keys: |
            ${{ runner.os }}-mdbook-

      - name: Install mdbook and mdbook-mermaid
        if: steps.cargo-cache.outputs.cache-hit != 'true'
        run: |
          cargo install mdbook --version ${{ env.MDBOOK_VERSION }}
          cargo install mdbook-mermaid --version ${{ env.MDBOOK_MERMAID_VERSION }}

      - name: Build mdBook
        working-directory: pages
        run: mdbook build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/book

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
